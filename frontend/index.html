<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadCare | KI-Analyse Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        .bbox {
            position: absolute;
            border: 2px solid #ef4444;
            background-color: rgba(239, 68, 68, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        .bbox-label {
            position: absolute;
            top: -18px;
            left: -2px;
            background-color: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 6px;
            white-space: nowrap;
            border-radius: 2px 2px 0 0;
        }

        #detail-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Lade-Spinner Animation */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="detail-modal" onclick="closeModal()">
        <div class="relative max-w-5xl w-full bg-white rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 z-[2100] bg-black/50 text-white rounded-full p-2 hover:bg-black transition-colors" onclick="closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div class="p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Detaillierte KI-Analyse</h2>
                <div id="modal-image-wrapper" class="image-container"></div>
            </div>
        </div>
    </div>

    <div class="absolute top-5 left-5 z-[1000] flex flex-col gap-4 w-full max-w-sm px-4 md:px-0">
        <div class="glass-effect p-6 rounded-2xl shadow-2xl border border-white/50">
            <h1 class="text-2xl font-bold text-gray-800 mb-1">RoadCare 🚧</h1>
            <p class="text-sm text-gray-600 mb-4">Live-Verbindung zu Hugging Face KI.</p>
            
            <div class="bg-white/60 p-3 rounded-lg mb-4 border border-gray-200">
                <div class="flex items-center gap-2 mb-2 text-xs font-semibold text-gray-700">
                    <span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span> Schaden erkannt
                </div>
                <div class="flex items-center gap-2 text-xs font-semibold text-gray-700">
                    <span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> Keine Schäden
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Land</label>
                        <input type="text" id="input-country" value="Germany" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Stadt</label>
                        <input type="text" id="input-city" value="Hamburg" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Straße</label>
                        <input type="text" id="input-street" value="Fuhlsbüttler Straße" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Abstand (m)</label>
                        <input type="number" id="input-distance" value="100" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <button id="btn-analyze" onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transition-all flex justify-center items-center">
                    <span id="btn-text">🚀 Strecke per KI analysieren</span>
                </button>
                
                <p id="loading-hint" class="hidden text-[10px] text-gray-500 text-center animate-pulse">
                    KI-Modell wird aufgeweckt. Das kann bis zu 2-3 Minuten dauern...
                </p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. Karte initialisieren
        const map = L.map('map', { zoomControl: false }).setView([53.614, 10.035], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let geoLayerGroup = L.layerGroup().addTo(map);

        // 2. FUNKTION: Bounding Boxen
        window.renderBBoxes = function(imgElement, detections) {
            const container = imgElement.parentElement;
            container.querySelectorAll('.bbox').forEach(b => b.remove());

            const natW = imgElement.naturalWidth;
            const natH = imgElement.naturalHeight;
            if (!natW || !natH) return;

            detections.forEach(det => {
                if (det.bounding_box) {
                    const b = det.bounding_box;
                    const left = (b.x_min / natW) * 100;
                    const top = (b.y_min / natH) * 100;
                    const width = ((b.x_max - b.x_min) / natW) * 100;
                    const height = ((b.y_max - b.y_min) / natH) * 100;

                    const boxDiv = document.createElement('div');
                    boxDiv.className = 'bbox';
                    boxDiv.style.left = left + '%'; boxDiv.style.top = top + '%';
                    boxDiv.style.width = width + '%'; boxDiv.style.height = height + '%';

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'bbox-label';
                    labelDiv.innerText = `${det.damage_class} ${(det.confidence*100).toFixed(0)}%`;
                    
                    boxDiv.appendChild(labelDiv);
                    container.appendChild(boxDiv);
                }
            });
        };

        window.openDetails = function(url, encodedDetections) {
            const detections = JSON.parse(decodeURIComponent(encodedDetections));
            const wrapper = document.getElementById('modal-image-wrapper');
            wrapper.innerHTML = `<img src="${url}" class="w-full h-auto block" onload="renderBBoxes(this, ${JSON.stringify(detections).replace(/"/g, '&quot;')})">`;
            document.getElementById('detail-modal').style.display = 'flex';
        };

        window.closeModal = function() { document.getElementById('detail-modal').style.display = 'none'; };

        // 3. HAUPTFUNKTION: Daten an API senden und GeoJSON empfangen
        async function runAnalysis() {
            const btn = document.getElementById('btn-analyze');
            const btnText = document.getElementById('btn-text');
            const hint = document.getElementById('loading-hint');
            
            const country = document.getElementById('input-country').value;
            const city = document.getElementById('input-city').value;
            const street = document.getElementById('input-street').value;
            const distance = document.getElementById('input-distance').value;
            
            if (!city || !street) {
                alert("Bitte Stadt und Straße eingeben!");
                return;
            }

            const payload = {
                "stadt": `${city}, ${country}`,
                "strassenname": street,
                "abstand_m": parseInt(distance)
            };

            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-gray-500');
            btn.classList.replace('hover:bg-blue-700', 'hover:bg-gray-600');
            btnText.innerHTML = '<span class="spinner"></span> Analyse läuft...';
            hint.classList.remove('hidden');

            try {
                const response = await fetch("https://justinph-ki-strassenschaden.hf.space/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`API Fehler: ${response.status}`);

                const geoJsonData = await response.json();
                geoLayerGroup.clearLayers();

                const newLayer = L.geoJSON(geoJsonData, {
                    // HIER IST DIE NEUE FARB-LOGIK
                    pointToLayer: (feature, latlng) => {
                        const detections = feature.properties.detections || [];
                        
                        // Wenn Schäden in der Liste sind -> Rot, ansonsten -> Blau
                        const color = detections.length > 0 ? "#ef4444" : "#3b82f6"; 
                        
                        return L.circleMarker(latlng, { 
                            radius: 8, 
                            fillColor: color, 
                            color: "white", 
                            weight: 2, 
                            fillOpacity: 0.9 
                        });
                    },
                    onEachFeature: (feature, layer) => {
                        const props = feature.properties;
                        const detections = props.detections || [];
                        const encoded = encodeURIComponent(JSON.stringify(detections));
                        
                        // Status-Text für das Popup (Schaden oder Kein Schaden)
                        const statusText = detections.length > 0 ? '<span class="text-red-500 font-bold">Schaden erkannt</span>' : '<span class="text-blue-500 font-bold">Keine Schäden</span>';

                        const popupContent = `
                            <div class="w-72 text-sm">
                                <h3 class="font-bold text-gray-800 border-b pb-1 mb-2">KI-Vorschau</h3>
                                <p class="text-xs text-gray-500 mb-2">Status: ${statusText}</p>
                                <div class="image-container mb-3">
                                    <img src="${props.image_url}" class="w-full h-auto block" onload="renderBBoxes(this, ${JSON.stringify(detections).replace(/"/g, '&quot;')})">
                                </div>
                                <button onclick="openDetails('${props.image_url}', '${encoded}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition-colors">
                                    🔍 Details & Analyse öffnen
                                </button>
                                <p class="text-[10px] text-gray-400 mt-2 italic">${new Date(props.timestamp).toLocaleString("de-DE")}</p>
                            </div>`;
                        layer.bindPopup(popupContent, { maxWidth: 400 });

                        // GPS-Polygone zeichnen, falls vorhanden (nur bei Schäden)
                        if (props.damage_coordinates) {
                            const polygonCoords = props.damage_coordinates.map(c => [c[1], c[0]]);
                            L.polygon(polygonCoords, { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.3, weight: 2 }).addTo(geoLayerGroup);
                        }
                    }
                }).addTo(geoLayerGroup);

                if (geoJsonData.features && geoJsonData.features.length > 0) {
                    map.fitBounds(newLayer.getBounds(), {padding: [50, 50]});
                } else {
                    alert("Die API hat keine Bilder für diese Straße gefunden.");
                }

            } catch (error) {
                console.error("Fehler bei der API-Abfrage:", error);
                alert("Fehler bei der Kommunikation mit dem Backend. Läuft der Server von Hugging Face?");
            } finally {
                btn.disabled = false;
                btn.classList.replace('bg-gray-500', 'bg-blue-600');
                btn.classList.replace('hover:bg-gray-600', 'hover:bg-blue-700');
                btnText.innerHTML = '🚀 Strecke per KI analysieren';
                hint.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
