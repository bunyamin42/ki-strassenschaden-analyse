<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadCare | KI-Analyse Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Container für das Bild, damit die KI-Boxen perfekt darüber liegen */
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        /* Styling für die Bounding Boxes (KI-Erkennung im Bild) */
        .bbox {
            position: absolute;
            border: 2px solid #ef4444;
            background-color: rgba(239, 68, 68, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        .bbox-label {
            position: absolute;
            top: -18px;
            left: -2px;
            background-color: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 6px;
            white-space: nowrap;
            border-radius: 2px 2px 0 0;
        }

        /* Modal Overlay für die Detailansicht */
        #detail-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="detail-modal" onclick="closeModal()">
        <div class="relative max-w-5xl w-full bg-white rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 z-[2100] bg-black/50 text-white rounded-full p-2 hover:bg-black transition-colors" onclick="closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div class="p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Detaillierte KI-Analyse</h2>
                <div id="modal-image-wrapper" class="image-container">
                    </div>
            </div>
        </div>
    </div>

    <div class="absolute top-5 left-5 z-[1000] flex flex-col gap-4 w-full max-w-sm px-4 md:px-0">
        <div class="glass-effect p-6 rounded-2xl shadow-2xl border border-white/50">
            <h1 class="text-2xl font-bold text-gray-800 mb-1">RoadCare 🚧</h1>
            <p class="text-sm text-gray-600 mb-6">KI-gestützte Straßenschadenerkennung.</p>
            
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Straße</label>
                        <input type="text" id="input-street" placeholder="Fuhlsbüttler Str." class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Land</label>
                        <input type="text" id="input-nr" placeholder="10" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">PLZ</label>
                        <input type="text" id="input-zip" placeholder="22305" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Stadt</label>
                        <input type="text" id="input-city" placeholder="Hamburg" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <button onclick="searchAddress()" class="w-full bg-gray-800 hover:bg-black text-white text-xs font-bold py-2 rounded-lg transition-all">
                    📍 Adresse suchen & Marker setzen
                </button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 1. Karte initialisieren
        const map = L.map('map', { zoomControl: false }).setView([53.614, 10.035], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { 
            attribution: '© OpenStreetMap' 
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. FUNKTION: Zeichnet KI-Boxen basierend auf der echten Bildgröße
        window.renderBBoxes = function(imgElement, detections) {
            const container = imgElement.parentElement;
            
            // Alte Boxen löschen, falls das Bild neu berechnet wird
            container.querySelectorAll('.bbox').forEach(b => b.remove());

            // Echte Pixelmaße des heruntergeladenen Bildes abfragen
            const natW = imgElement.naturalWidth;
            const natH = imgElement.naturalHeight;
            if (!natW || !natH) return;

            detections.forEach(det => {
                if (det.bounding_box) {
                    const b = det.bounding_box;
                    
                    // Umrechnung von KI-Pixeln in Web-Prozente
                    const left = (b.x_min / natW) * 100;
                    const top = (b.y_min / natH) * 100;
                    const width = ((b.x_max - b.x_min) / natW) * 100;
                    const height = ((b.y_max - b.y_min) / natH) * 100;

                    const boxDiv = document.createElement('div');
                    boxDiv.className = 'bbox';
                    boxDiv.style.left = left + '%'; 
                    boxDiv.style.top = top + '%';
                    boxDiv.style.width = width + '%'; 
                    boxDiv.style.height = height + '%';

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'bbox-label';
                    labelDiv.innerText = `${det.damage_class} ${(det.confidence*100).toFixed(0)}%`;
                    
                    boxDiv.appendChild(labelDiv);
                    container.appendChild(boxDiv);
                }
            });
        };

        // 3. FUNKTIONEN für das Detail-Modal
        window.openDetails = function(url, encodedDetections) {
            const detections = JSON.parse(decodeURIComponent(encodedDetections));
            const wrapper = document.getElementById('modal-image-wrapper');
            // Bild einfügen und beim Laden (onload) direkt wieder die Boxen berechnen lassen
            wrapper.innerHTML = `<img src="${url}" class="w-full h-auto block" onload="renderBBoxes(this, ${JSON.stringify(detections).replace(/"/g, '&quot;')})">`;
            document.getElementById('detail-modal').style.display = 'flex';
        };

        window.closeModal = function() { 
            document.getElementById('detail-modal').style.display = 'none'; 
        };

        // 4. Daten von Backend (output.geojson) laden und auf Karte zeichnen
        fetch('output.geojson')
            .then(res => res.json())
            .then(data => {
                const geoLayer = L.geoJSON(data, {
                    // Marker für die Bilder
                    pointToLayer: (feature, latlng) => {
                        return L.circleMarker(latlng, { radius: 8, fillColor: "#3b82f6", color: "white", weight: 2, fillOpacity: 0.9 });
                    },
                    onEachFeature: (feature, layer) => {
                        const props = feature.properties;
                        const detections = props.detections || [];
                        const encoded = encodeURIComponent(JSON.stringify(detections));

                        // Inhalt des kleinen Popups auf der Karte
                        const popupContent = `
                            <div class="w-72 text-sm">
                                <h3 class="font-bold text-gray-800 border-b pb-1 mb-2">KI-Vorschau</h3>
                                <div class="image-container mb-3">
                                    <img src="${props.image_url}" class="w-full h-auto block" onload="renderBBoxes(this, ${JSON.stringify(detections).replace(/"/g, '&quot;')})">
                                </div>
                                <button onclick="openDetails('${props.image_url}', '${encoded}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition-colors">
                                    🔍 Details & Analyse öffnen
                                </button>
                            </div>`;
                        layer.bindPopup(popupContent, { maxWidth: 400 });

                        // Falls GPS-Koordinaten für den Schadensumriss vorliegen (Polygone)
                        if (props.damage_coordinates) {
                            const polygonCoords = props.damage_coordinates.map(c => [c[1], c[0]]); // GeoJSON Lon/Lat zu Leaflet Lat/Lon
                            L.polygon(polygonCoords, { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.3, weight: 2 }).addTo(map);
                        }
                    }
                }).addTo(map);

                // Karte an den Bereich der Daten anpassen
                if (data.features && data.features.length > 0) {
                    map.fitBounds(geoLayer.getBounds(), {padding: [50, 50]});
                }
            })
            .catch(err => console.error("Fehler beim Laden der output.geojson:", err));

        // 5. Adresssuche via Nominatim
        let reportMarker;
        async function searchAddress() {
            const s = document.getElementById('input-street').value;
            const n = document.getElementById('input-nr').value;
            const z = document.getElementById('input-zip').value;
            const c = document.getElementById('input-city').value;
            
            if (!s || !c) {
                alert("Bitte mindestens Straße und Stadt eingeben.");
                return;
            }

            const query = `${s} ${n}, ${z} ${c}`;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const results = await res.json();
            
            if (results.length > 0) {
                const coords = [results[0].lat, results[0].lon];
                map.setView(coords, 18);
                if (reportMarker) {
                    reportMarker.setLatLng(coords);
                } else {
                    reportMarker = L.marker(coords, { draggable: true }).addTo(map);
                }
            } else {
                alert("Adresse konnte nicht gefunden werden.");
            }
        }
    </script>
</body>
</html>
